  <main>
    <h1>Contáctanos</h1>
    <p>Estamos disponibles para atenderte. Llena el formulario y nos pondremos en contacto contigo.</p>

    <form>
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" placeholder="Tu nombre completo">

      <label for="correo">Correo electrónico:</label>
      <input type="email" id="correo" placeholder="tucorreo@ejemplo.com">

      <label for="mensaje">Mensaje:</label>
      <textarea id="mensaje" placeholder="Escribe tu mensaje aquí..."></textarea>

      <button type="submit">Enviar mensaje</button>
    </form>
  </main>
